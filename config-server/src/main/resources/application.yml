server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:///C:/config-repo
        git:
          uri: https://github.com/깃 레포주소/peoplecore-config-repo
          default-label: main
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}
    bus:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: busrefresh, health