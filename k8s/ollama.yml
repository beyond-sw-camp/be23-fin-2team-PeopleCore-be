apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 30Gi
  storageClassName: gp2          # 팀 default class 그대로
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  strategy:
    type: Recreate                # face-api/elasticsearch와 동일 패턴
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        eks.amazonaws.com/nodegroup: gpu     # GPU 노드그룹 자동 라벨
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule

      initContainers:
        - name: pull-model
          image: ollama/ollama:0.3.12
          command: ["/bin/sh","-c"]
          args:
            - |
              ollama serve &
              SERVER_PID=$!
              until curl -s http://localhost:11434/ > /dev/null; do sleep 2; done
              if ollama list | grep -q "exaone3.5:7.8b"; then
                echo "model already exists"
              else
                echo "pulling exaone3.5:7.8b..."
                ollama pull exaone3.5:7.8b
              fi
              kill $SERVER_PID
              wait $SERVER_PID 2>/dev/null
          env:
            - { name: OLLAMA_HOST,   value: "0.0.0.0:11434" }
            - { name: OLLAMA_MODELS, value: "/root/.ollama/models" }
          volumeMounts:
            - name: models
              mountPath: /root/.ollama

      containers:
        - name: ollama
          image: ollama/ollama:0.3.12
          ports:
            - containerPort: 11434
          env:
            - { name: OLLAMA_HOST,              value: "0.0.0.0:11434" }
            - { name: OLLAMA_KEEP_ALIVE,        value: "-1" }
            - { name: OLLAMA_NUM_PARALLEL,      value: "1" }
            - { name: OLLAMA_MAX_LOADED_MODELS, value: "1" }
            - { name: OLLAMA_MODELS,            value: "/root/.ollama/models" }
          resources:
            requests:
              nvidia.com/gpu: 1
              memory: "12Gi"
              cpu: "2"
            limits:
              nvidia.com/gpu: 1
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /, port: 11434 }
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5

      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: ollama